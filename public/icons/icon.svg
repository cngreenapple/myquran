<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="book" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Decorative pattern -->
  <g opacity="0.12" stroke="#ffffff" stroke-width="2" fill="none">
    <circle cx="128" cy="128" r="40"/>
    <circle cx="384" cy="128" r="40"/>
    <circle cx="128" cy="384" r="40"/>
    <circle cx="384" cy="384" r="40"/>
    <path d="M128 88 L168 128 L128 168 L88 128 Z"/>
    <path d="M384 88 L424 128 L384 168 L344 128 Z"/>
    <path d="M128 344 L168 384 L128 424 L88 384 Z"/>
    <path d="M384 344 L424 384 L384 424 L344 384 Z"/>
  </g>
  <!-- Book -->
  <g transform="translate(256, 256)">
    <!-- Open book base shadow -->
    <ellipse cx="0" cy="115" rx="155" ry="14" fill="#000000" opacity="0.15"/>
    <!-- Book pages -->
    <path d="M -150 -90 L 0 -75 L 150 -90 L 150 100 L 0 110 L -150 100 Z" fill="url(#book)" stroke="#047857" stroke-width="2"/>
    <!-- Center binding -->
    <line x1="0" y1="-75" x2="0" y2="110" stroke="#047857" stroke-width="2.5"/>
    <!-- Decorative arch above book (mihrab-style) -->
    <path d="M -100 -90 Q -100 -150 0 -150 Q 100 -150 100 -90" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.9"/>
    <!-- Text lines on left page -->
    <g stroke="#047857" stroke-width="3" stroke-linecap="round" opacity="0.65">
      <line x1="-130" y1="-55" x2="-20" y2="-50"/>
      <line x1="-130" y1="-35" x2="-20" y2="-30"/>
      <line x1="-130" y1="-15" x2="-30" y2="-10"/>
      <line x1="-130" y1="5" x2="-20" y2="10"/>
      <line x1="-130" y1="25" x2="-40" y2="30"/>
      <line x1="-130" y1="45" x2="-20" y2="50"/>
      <line x1="-130" y1="65" x2="-30" y2="70"/>
    </g>
    <!-- Text lines on right page -->
    <g stroke="#047857" stroke-width="3" stroke-linecap="round" opacity="0.65">
      <line x1="20" y1="-50" x2="130" y2="-55"/>
      <line x1="20" y1="-30" x2="130" y2="-35"/>
      <line x1="30" y1="-10" x2="130" y2="-15"/>
      <line x1="20" y1="10" x2="130" y2="5"/>
      <line x1="40" y1="30" x2="130" y2="25"/>
      <line x1="20" y1="50" x2="130" y2="45"/>
      <line x1="30" y1="70" x2="130" y2="65"/>
    </g>
    <!-- Crescent and star at top -->
    <g transform="translate(0, -180)">
      <path d="M 0 -20 A 20 20 0 1 0 8 0 A 16 16 0 1 1 0 -20" fill="#fbbf24"/>
      <circle cx="22" cy="-15" r="4" fill="#fbbf24"/>
    </g>
  </g>
</svg>